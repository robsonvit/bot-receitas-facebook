name: Bot Reddit para Facebook

on:
  workflow_dispatch:
  push:
    branches:
      - main # Permite execução manual ou via Google Apps Script

permissions:
  contents: write # Permite que o bot faça commit de volta (salvar o posted.json)

jobs:
  post_to_facebook:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Instalar FFmpeg (para suporte a vídeos)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Executar Bot
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_TOKEN: ${{ secrets.FB_TOKEN }}
        run: python bot.py

      - name: Salvar histórico (Commit posted.json)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add posted.json
          git commit -m "chore: atualiza histórico de postagens [skip ci]" || echo "Nenhuma mudança no histórico"
          git push
